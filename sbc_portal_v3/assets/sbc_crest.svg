<?xml version="1.0" encoding="UTF-8"?>
<!-- St Bernard's College Essendon - Crest Recreation -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2247;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c89a20;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M20,20 L180,20 L180,150 Q180,210 100,230 Q20,210 20,150 Z"
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Gold horizontal band -->
  <path d="M20,80 L180,80 L180,120 L20,120 Z"
        fill="#c9a030" opacity="0.9"/>

  <!-- Cross on upper shield -->
  <rect x="92" y="28" width="16" height="48" fill="url(#goldGrad)" rx="1"/>
  <rect x="68" y="44" width="64" height="16" fill="url(#goldGrad)" rx="1"/>

  <!-- SBC Letters on band -->
  <text x="100" y="108" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="#0d2247" text-anchor="middle" letter-spacing="4">SBC</text>

  <!-- Stars / decorative elements lower shield -->
  <text x="70" y="160" font-family="serif" font-size="28" fill="url(#goldGrad)" text-anchor="middle">✦</text>
  <text x="130" y="160" font-family="serif" font-size="28" fill="url(#goldGrad)" text-anchor="middle">✦</text>
  <text x="100" y="185" font-family="serif" font-size="18" fill="url(#goldGrad)" text-anchor="middle">✦</text>

  <!-- Bottom motto scroll -->
  <path d="M30,210 Q100,225 170,210" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <text x="100" y="220" font-family="Georgia, serif" font-size="9" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="1">EST. 1940 · ESSENDON</text>
</svg>
